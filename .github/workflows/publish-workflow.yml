name: Publish Workflow

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: tests/FoggyBalrog.MermaidDotNet.IntegrationTests/Tooling/Node/package-lock.json

      - name: Restore dependencies
        run: dotnet restore FoggyBalrog.MermaidDotNet.slnx

      - name: Build
        run: dotnet build FoggyBalrog.MermaidDotNet.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test FoggyBalrog.MermaidDotNet.slnx --no-build --configuration Release

  publish-docs:
    needs: build-test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Install DocFX
      run: dotnet tool update -g docfx

    - name: Generate diagrams TOC
      shell: bash
      run: ./.github/scripts/docfx/generate-diagrams-toc.sh

    - name: Get Quick Start section from README
      shell: bash
      run: ./.github/scripts/docfx/get-quick-start-from-readme.sh

    - name: Run DocFX
      run: docfx ./docs/docfx.json

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs/_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
  publish-nuget:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version match
        shell: pwsh
        run: ./.github/scripts/check-version-match.ps1

      - name: Generate NuGet README
        shell: pwsh
        run: ./.github/scripts/generate-nuget-readme.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore FoggyBalrog.MermaidDotNet.slnx

      - name: Build
        run: dotnet build FoggyBalrog.MermaidDotNet.slnx --no-restore --configuration Release

      - name: Create NuGet package
        run: dotnet pack --no-build --output nupkgs

      - name: Push NuGet package
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: nupkgs/*.nupkg
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
